name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks-history:
    name: Gitleaks — complete Git history
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks v8.18.4
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --location \
            --output gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan all reachable Git history
        run: |
          set -Eeuo pipefail
          ./gitleaks detect \
            --source . \
            --log-opts="--all" \
            --redact \
            --no-banner \
            --exit-code 1

  gitleaks-filesystem:
    name: Gitleaks — current filesystem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gitleaks v8.18.4
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --location \
            --output gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan current tracked file tree
        run: |
          set -Eeuo pipefail
          ./gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --no-banner \
            --exit-code 1
