name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  # gitleaks needs to post a SARIF if it ever does; keep minimal for now.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  repo-scanner:
    name: Repo-wide gitleaks (filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run gitleaks detect (filesystem)
        run: |
          # Pin a known good version. Update when bumping.
          curl -sSL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --redact --no-banner --exit-code 1 --source . || {
            echo "gitleaks found potential secrets; follow the instructions above to remediate."
            exit 1
          }
