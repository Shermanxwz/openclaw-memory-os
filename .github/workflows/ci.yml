name: ci

on:
  push:
    branches: [main, agent/final-freeze-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + pytest (sample backend)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      # The autonomous_governance.sh runner writes to an owner-private state/log
      # path by default. The CI runner
      # user cannot write to /var/log/, so redirect to a per-job location
      # inside the workspace; this keeps the runner testable in CI without
      # granting the runner sudo or moving the log path globally.
      LOG_FILE: ${{ github.workspace }}/.ci-logs/governance.log
      # Force the test-mode venv discovery path that ships with the test
      # suite (see tests/test_autonomous_governance_runner.py for the
      # explicit fixture that exercises the runner in CI).
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            python -m pip install -r requirements/dev-py312.lock
            python -m pip install --no-deps -e .
          else
            python -m pip install -e ".[dev]"
          fi
          python -m pip check

      - name: Compile-check
        run: |
          python -W error::SyntaxWarning -m compileall -q openclaw_memory_os scripts

      - name: Smoke import
        run: |
          python -c "import openclaw_memory_os; from openclaw_memory_os.app import create_app; app = create_app(); print('ok:', app.title)"

      - name: Pytest
        run: pytest -v

      - name: CLI smoke
        run: |
          python -m openclaw_memory_os.cli health | head -c 1024

  privacy-scan:
    name: In-repo privacy scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/runtime-py312.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Run scanner
        run: ./scripts/privacy_scan.sh
