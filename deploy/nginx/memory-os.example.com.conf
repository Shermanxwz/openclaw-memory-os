# nginx vhost: memory-os.example.com
# This file is included from nginx's http{} context.

# Never log query strings. This prevents accidental credentials or private
# recall parameters from entering access logs even when a client builds a bad URL.
log_format memory_os_no_args '$remote_addr - $remote_user [$time_local] '
                             '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name memory-os.example.com;

    access_log /var/log/nginx/memory-os.example.com.access.log memory_os_no_args;
    error_log  /var/log/nginx/memory-os.example.com.error.log warn;

    # Query-string authentication is unsupported. Reject accidental token URLs
    # before redirecting so the credential is not propagated to HTTPS.
    if ($arg_token != "") { return 400; }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name memory-os.example.com;

    access_log /var/log/nginx/memory-os.example.com.access.log memory_os_no_args;
    error_log  /var/log/nginx/memory-os.example.com.error.log warn;

    if ($arg_token != "") { return 400; }

    ssl_certificate     /etc/letsencrypt/live/memory-os.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/memory-os.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_ecdh_curve X25519:secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 50m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    location / {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffers         16 16k;
        proxy_busy_buffers_size 32k;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/xml+rss image/svg+xml;
}
